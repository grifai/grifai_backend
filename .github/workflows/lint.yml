name: Lint
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@42375524b02ad5b7f5ff05c8de5ae5b11f18e4b4  # v5.4.0
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy fastapi uvicorn
      - name: Run flake8
        run: flake8 app/
      - name: Run black
        run: black --check app/
      - name: Run isort
        run: isort --check app/
      - name: Run mypy
        run: mypy app/
