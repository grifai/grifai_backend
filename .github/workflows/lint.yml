name: Lint
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy fastapi uvicorn
      - name: Run flake8
        run: flake8 app/ --max-line-length=88
      - name: Run black
        run: black --check app/
      - name: Run isort
        run: isort --check app/
      - name: Run mypy
        run: mypy app/
